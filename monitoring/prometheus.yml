# Prometheus vive en tu PC (no en el VPS) — scrapea los exportadores del
# VPS a través de un túnel SSH que vos abrís a mano (ver docs/DEPLOY.md):
#
#   ssh -N -L 18080:127.0.0.1:8080 -L 9100:127.0.0.1:9100 root@vps-2mino
#
# El lado LOCAL del forward de cadvisor es 18080, no 8080 — el 8080 de tu
# PC ya lo usa Jenkins (ci/docker-compose.yml, corre siempre). El lado
# REMOTO (el puerto real de cadvisor en la VPS) sigue siendo 8080, no hace
# falta tocar nada ahí. host.docker.internal es cómo un contenedor de tu
# PC le habla al localhost de tu PC (no del VPS).
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'vps-cadvisor'
    static_configs:
      - targets: ['host.docker.internal:18080']

  - job_name: 'vps-node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']
