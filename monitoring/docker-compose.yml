services:

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    # Solo localhost — nadie más necesita pegarle directo, Grafana lo
    # consulta por la red interna de este compose.
    ports:
      - "127.0.0.1:9090:9090"
    # host.docker.internal apunta a tu PC (donde corre el túnel SSH al
    # VPS) — en Docker Desktop (Win/Mac) ya resuelve solo; en Linux nativo
    # hace falta este extra_hosts.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED:  "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3001:3000"

volumes:
  prometheus_data:
  grafana_data:
