server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api-integracion:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSockets de ms-social (presencia/notificaciones/chat) — van directo
    # a ms-social, no pasan por el gateway (api-integracion es HTTP REST
    # nada más). ms-social no tiene puerto expuesto al host, solo nginx
    # le habla dentro de la red Docker — sigue siendo la única puerta
    # pública, igual que /api/.
    location /ws/ {
        proxy_pass http://ms-social:6200/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s; # sockets de larga duración, no cortar por inactividad
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html nunca se cachea: sin esto, el navegador puede seguir
    # sirviendo una versión vieja del sitio (con el JS/CSS de un build
    # anterior) sin ni siquiera revalidar contra el servidor.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Los assets de Vite sí llevan hash en el nombre (index-XXXX.js) — un
    # build nuevo genera un nombre nuevo, así que cachearlos "para siempre"
    # es seguro y no puede servir contenido viejo bajo un nombre nuevo.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
