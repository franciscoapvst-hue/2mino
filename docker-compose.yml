services:

  # ── Base de datos ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       2mino
      POSTGRES_USER:     2mino
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U 2mino"]
      interval: 5s
      timeout:  5s
      retries:  10
    # Exponer en local para debug; comentar en producción si no se necesita
    ports:
      - "5432:5432"

  # ── Microservicio de usuarios ────────────────────
  ms-usuarios:
    build: ./ms-usuarios
    restart: unless-stopped
    environment:
      PORT:         4000
      DB_URL:       postgres://2mino:${POSTGRES_PASSWORD}@postgres:5432/2mino
      ENABLE_EMAIL: ${ENABLE_EMAIL:-false}
    depends_on:
      postgres:
        condition: service_healthy
    # Solo accesible dentro de la red Docker (sin puerto externo)

  # ── Microservicio frontend/landing ───────────────
  ms-frontend-landing:
    build: ./ms-frontend-landing
    restart: unless-stopped
    environment:
      PORT:         5000
      DB_URL:       postgres://2mino:${POSTGRES_PASSWORD}@postgres:5432/2mino
      ENABLE_EMAIL: ${ENABLE_EMAIL:-false}
    depends_on:
      postgres:
        condition: service_healthy

  # ── Microservicio de salas ───────────────────────
  ms-salas:
    build: ./ms-salas
    restart: unless-stopped
    environment:
      PORT:   6000
      DB_URL: postgres://2mino:${POSTGRES_PASSWORD}@postgres:5432/2mino
    depends_on:
      postgres:
        condition: service_healthy

  # ── API de integración (pública) ─────────────────
  api-integracion:
    build: ./api-integracion
    restart: unless-stopped
    environment:
      PORT:             3000
      MS_USUARIOS_URL:          http://ms-usuarios:4000
      MS_FRONTEND_LANDING_URL:  http://ms-frontend-landing:5000
      MS_SALAS_URL:             http://ms-salas:6000
      JWT_SECRET:       ${JWT_SECRET}
      CORS_ORIGIN:      ${CORS_ORIGIN:-*}
    depends_on:
      - ms-usuarios
    ports:
      - "3000:3000"

volumes:
  postgres_data:
