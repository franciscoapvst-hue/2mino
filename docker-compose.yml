services:

  # ── Base de datos ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # max_connections subido de 100 (default) a 200: los 4 servicios que
    # tienen su propio pool (max:15 c/u) ya reservan 60 en reposo, y el
    # default dejaba poco margen para BO/herramientas/picos.
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_DB:       2mino
      POSTGRES_USER:     2mino
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U 2mino"]
      interval: 5s
      timeout:  5s
      retries:  10
    # Sin puerto externo por defecto (no hace falta exponerlo a producción).
    # Para debug local, agregar el mapeo en docker-compose.override.yml
    # (gitignored) en vez de tocar este archivo.

  # ── Microservicio de usuarios ────────────────────
  ms-usuarios:
    build: ./ms-usuarios
    restart: unless-stopped
    environment:
      PORT:         4000
      DB_URL:       postgres://2mino:${POSTGRES_PASSWORD}@postgres:5432/2mino
      ENABLE_EMAIL:     ${ENABLE_EMAIL:-false}
      RESEND_API_KEY:   ${RESEND_API_KEY:-}
      EMAIL_FROM:       ${EMAIL_FROM:-2mino <onboarding@resend.dev>}
      APP_URL:          ${APP_URL:-https://2mino.online}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:     ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s
    # Solo accesible dentro de la red Docker (sin puerto externo)

  # ── Microservicio frontend/landing ───────────────
  ms-frontend-landing:
    build: ./ms-frontend-landing
    restart: unless-stopped
    environment:
      PORT:         5000
      DB_URL:       postgres://2mino:${POSTGRES_PASSWORD}@postgres:5432/2mino
      ENABLE_EMAIL: ${ENABLE_EMAIL:-false}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:     ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s

  # ── Microservicio de salas ───────────────────────
  ms-salas:
    build: ./ms-salas
    restart: unless-stopped
    environment:
      PORT:          6001
      DB_URL:        postgres://2mino:${POSTGRES_PASSWORD}@postgres:5432/2mino
      MS_SOCIAL_URL: http://ms-social:6200
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:     ["CMD", "node", "-e", "fetch('http://127.0.0.1:6001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s

  # ── Microservicio social (amigos, chat, notificaciones) ──
  ms-social:
    build: ./ms-social
    restart: unless-stopped
    environment:
      PORT:            6200
      DB_URL:          postgres://2mino:${POSTGRES_PASSWORD}@postgres:5432/2mino
      JWT_SECRET:      ${JWT_SECRET}
      MS_USUARIOS_URL: http://ms-usuarios:4000
      MS_SALAS_URL:    http://ms-salas:6001
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:     ["CMD", "node", "-e", "fetch('http://127.0.0.1:6200/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s
    # Sin puerto externo: nginx proxea /ws/ directo acá (ver nginx.conf)

  # ── API de integración (pública) ─────────────────
  api-integracion:
    build: ./api-integracion
    restart: unless-stopped
    environment:
      PORT:             3000
      MS_USUARIOS_URL:          http://ms-usuarios:4000
      MS_FRONTEND_LANDING_URL:  http://ms-frontend-landing:5000
      MS_SALAS_URL:             http://ms-salas:6001
      MS_SOCIAL_URL:            http://ms-social:6200
      JWT_SECRET:       ${JWT_SECRET}
      CORS_ORIGIN:      ${CORS_ORIGIN:-*}
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      ms-usuarios:
        condition: service_healthy
    healthcheck:
      test:     ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s
    # El frontend lo alcanza vía la red Docker (proxy /api de nginx) — no
    # hace falta puerto para eso. Se publica igual en 127.0.0.1:3000 (solo
    # loopback, nunca la interfaz pública) para que el Back Office pueda
    # llegar por túnel SSH (ver docs/CASOS_DE_USO_BACKOFFICE.md §10.1) sin
    # exponer el gateway a internet.
    ports:
      - "127.0.0.1:3000:3000"

  # ── Frontend (build estático servido por nginx) ──
  frontend:
    build:
      context: .
      args:
        VITE_GOOGLE_CLIENT_ID:          ${GOOGLE_CLIENT_ID:-}
        VITE_ADSENSE_CLIENT_ID:         ${ADSENSE_CLIENT_ID:-}
        VITE_ADSENSE_SLOT_DASHBOARD:    ${ADSENSE_SLOT_DASHBOARD:-}
        VITE_ADSENSE_SLOT_MATCHMAKING:  ${ADSENSE_SLOT_MATCHMAKING:-}
        VITE_ADSENSE_SLOT_MANO:         ${ADSENSE_SLOT_MANO:-}
    restart: unless-stopped
    depends_on:
      api-integracion:
        condition: service_healthy
    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s
    # Sin puerto externo: Caddy es la única puerta pública (ver servicio `caddy`)

  # ── Reverse proxy con TLS automático (Let's Encrypt) ─
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:?falta DOMAIN en .env, ej. 2mino.online}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy

  # ── Exportadores de métricas (VPS) ───────────────
  # Solo esto corre acá — lo pesado (Prometheus + Grafana, el dashboard en
  # sí) vive en tu PC, ver monitoring/docker-compose.yml y docs/DEPLOY.md.
  # Mismo espíritu que ci/ (Jenkins/SonarQube en local, nunca en el VPS que
  # sirve tráfico real): estos dos contenedores solo LEEN y EXPONEN
  # métricas, no las guardan ni las grafican — eso es trabajo de Grafana
  # corriendo en tu máquina. docs/ESCALABILIDAD.md — cierra el gap de "no
  # hay forma de enterarse de un problema sin que un jugador se queje".
  cadvisor:
    # v0.49.1 (gcr.io, registro viejo) no resuelve contenedores en Docker
    # 29.x con el containerd snapshotter (driver-type
    # io.containerd.snapshotter.v1) — error "failed to identify the
    # read-write layer ID". Soporte agregado en v0.53.0+ (PR #3709,
    # google/cadvisor), que además movió el registro a ghcr.io/google.
    # Verificado v0.60.5 en la VPS real: resuelve nombres/labels de todos
    # los contenedores sin errores.
    image: ghcr.io/google/cadvisor:v0.60.5
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    # Métricas por contenedor (CPU/RAM/IO), formato Prometheus en /metrics.
    # Solo loopback — se llega por túnel SSH desde tu PC (ver
    # docs/DEPLOY.md), nunca expuesto a internet, mismo criterio que
    # api-integracion.
    ports:
      - "127.0.0.1:8080:8080"

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    # Métricas del HOST (RAM/disco/CPU de la VPS entera, no por contenedor)
    # — cAdvisor no ve esto, y es justo lo que hace falta para detectar "se
    # llenó el disco" antes de que un jugador se queje. Mismo criterio de
    # solo-loopback que cadvisor.
    ports:
      - "127.0.0.1:9100:9100"

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
