services:

  sonar-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     sonar
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD}
      POSTGRES_DB:       sonar
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 5s
      timeout:  5s
      retries:  10

  sonarqube:
    image: sonarqube:community
    restart: unless-stopped
    depends_on:
      sonar-db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL:      jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD}
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs
    # Sonar usa Elasticsearch por dentro; en Docker Desktop (WSL2) hay que
    # subir vm.max_map_count en la VM del backend, ver docs/CI.md.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    restart: unless-stopped
    depends_on:
      - sonarqube
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JENKINS_ADMIN_USER:     ${JENKINS_ADMIN_USER}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD}
      GITHUB_USERNAME:        ${GITHUB_USERNAME}
      GITHUB_TOKEN:           ${GITHUB_TOKEN}
      SONAR_TOKEN:            ${SONAR_TOKEN}
      VPS_HOST:               ${VPS_HOST}
      VPS_USER:               ${VPS_USER}
      VPS_PASSWORD:           ${VPS_PASSWORD}
      CASC_JENKINS_CONFIG:    /var/jenkins_home/casc/jenkins-casc.yaml
      JAVA_OPTS:              -Djenkins.install.runSetupWizard=false
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./jenkins-casc.yaml:/var/jenkins_home/casc/jenkins-casc.yaml:ro

volumes:
  sonar_db_data:
  sonar_data:
  sonar_extensions:
  sonar_logs:
  jenkins_home:
