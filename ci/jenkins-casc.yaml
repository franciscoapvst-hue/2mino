jenkins:
  systemMessage: "2mino CI (local)"
  numExecutors: 2
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER}"
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy:
    globalMatrix:
      permissions:
        - "Overall/Administer:${JENKINS_ADMIN_USER}"

unclassified:
  sonarGlobalConfiguration:
    installations:
      - name: "SonarQubeLocal"
        serverUrl: "http://sonarqube:9000"
        credentialsId: "sonar-token"
        webhookSecretId: null

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "github-pat"
              username: "${GITHUB_USERNAME}"
              password: "${GITHUB_TOKEN}"
              description: "GitHub PAT (solo lectura) para el checkout de 2mino"
          - string:
              scope: GLOBAL
              id: "sonar-token"
              secret: "${SONAR_TOKEN}"
              description: "Token de SonarQube para el análisis"
          - string:
              scope: GLOBAL
              id: "vps-password"
              secret: "${VPS_PASSWORD}"
              description: "Contraseña root del VPS de producción, para el deploy automático"

tool:
  nodejs:
    installations:
      - name: "node20"
        properties:
          - installSource:
              installers:
                # >= 20.19.0: rolldown (dependencia de vitest/vite) no carga
                # su binding nativo en versiones más viejas de Node 20.
                - nodeJSInstaller:
                    id: "20.20.2"

jobs:
  - script: >
      pipelineJob('2mino-ci') {
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/franciscoapvst-hue/2mino.git')
                  credentials('github-pat')
                }
                branches('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
        triggers {
          scm('H/5 * * * *')
        }
      }
